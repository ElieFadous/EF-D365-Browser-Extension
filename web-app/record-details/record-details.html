<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details</title>
  <link rel="stylesheet" href="record-details.css" />
</head>
<body>
  <div class="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="22" height="22" aria-hidden="true">
            <path fill-rule="evenodd" fill="#fff" d="M 10,6 L 46,6 L 58,18 L 58,46 L 46,58 L 10,58 Z M 22,17 L 40,17 L 50,27 L 50,37 L 40,47 L 22,47 Z"/>
            <polygon points="36,21 28,34 33,34 27,47 43,31 37,31" fill="#FFB900"/>
          </svg>
        </div>
        <div class="header-titles">
          <span class="header-title">Record Details</span>
          <span class="header-sub" id="env-url"></span>
        </div>
      </div>
      <span class="header-env-badge" id="env-name"></span>
    </header>

    <!-- ── Content ── -->
    <div class="content" id="content">
      <div id="state-container" class="state-msg state-info">Loading record details&hellip;</div>

      <div id="rd-root" class="rd-layout hidden">

        <!-- ── Main column ── -->
        <div class="rd-main">

          <!-- Clone bar -->
          <div id="clone-bar" class="clone-bar hidden">
            <div class="clone-row">
              <button id="btn-clone" type="button" class="btn btn--primary btn--sm clone-btn">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
                  <rect x="5" y="4" width="9" height="11" rx="1.5"/>
                  <path d="M2 11V2.5A1.5 1.5 0 0 1 3.5 1H11"/>
                </svg>
                Clone
              </button>
              <select id="clone-target" class="select select--sm"></select>
            </div>
            <div id="connect-target-panel" class="alert alert--warning hidden">
              <div id="connect-target-text"></div>
              <div class="alert-actions">
                <button id="btn-connect-target" type="button" class="btn btn--secondary btn--sm">Connect Target Environment</button>
              </div>
            </div>
            <div id="clone-result" class="hidden"></div>
          </div>

          <!-- Detail cards -->
          <div id="rd-cards" class="rd-cards"></div>

          <!-- Actions -->
          <div class="rd-actions">
            <button id="btn-open-metadata" type="button" class="btn-link">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                <ellipse cx="8" cy="4" rx="5" ry="1.8"/>
                <path d="M3 4v3.5c0 1 2.2 1.8 5 1.8s5-.8 5-1.8V4"/>
                <path d="M3 7.5V11c0 1 2.2 1.8 5 1.8s5-.8 5-1.8V7.5"/>
              </svg>
              Open in Metadata Browser
            </button>
          </div>
        </div>

        <!-- ── Open In sidebar ── -->
        <div class="rd-sidebar">
          <div class="rd-sidebar-title">Open In&hellip;</div>
          <div id="rd-open-in-list" class="rd-open-in-list"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Clone error modal -->
  <div id="clone-err-overlay" class="clone-err-overlay hidden">
    <div class="clone-err-modal">
      <div class="clone-err-modal__title">Clone Error Details</div>
      <pre id="clone-err-modal-body" class="clone-err-modal__body"></pre>
      <button id="clone-err-modal-close" class="clone-err-modal__close">Close</button>
    </div>
  </div>

  <script src="record-details.js"></script>
</body>
</html>
